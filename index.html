"use strict";

//setting up
function getComputerChoice() {
    let computerChoice = ["rock", "paper", "scissors"];
    const randomChoice = Math.floor(Math.random() * computerChoice.length);
    return computerChoice[randomChoice];
};

function getHumanChoice() {
    return prompt("Rock, Paper, Scissors??");
}

let computerScore = 0;

        if (humanScore > computerScore) {
            { alert ("One for humanity!");}
        } else if (humanScore === computerScore) {
            { alert ("Tie! Repeat game?");}
        } else {
            { alert ("You lose!");}
        };
    
    //using shell
    let playAgain = confirm(message + "Final: " + "Human score: " + humanScore + "Computer score: " + computerScore);
    //always use () on an if statement
    if (playAgain) {
        console.clear();
        resetGame();
        playGame();
    } else {
        { alert ("Thanks for playing!");}
        console.clear();
    }

}

//reset game

let resetGame = () => {
    humanScore = 0;
    computerScore = 0;
    roundsPlayed = 0;
}

//whole logic
function playGame() {
    function playRound(humanChoice, computerChoice){

    if (humanChoice === computerChoice) {
        roundsPlayed++;
        { alert("TIE!!!" + "Human Score: " + humanScore + " Computer Score: " + computerScore + " Round: " + roundsPlayed); }
    } else if (
        (humanChoice === "rock" && computerChoice === "scissors") ||
        (humanChoice === "paper" && computerChoice === "rock") ||
        (humanChoice === "scissors" && computerChoice === "rock")) {
        humanScore++;
        roundsPlayed++;
        { alert ("One for humans! Human Score: " + humanScore + " Round: " + roundsPlayed); }
    } else {
        computerScore++;
        roundsPlayed++;
        { alert ("World Takeover! Computer Score: " + computerScore + " Round: " + roundsPlayed); }
    }

    if (roundsPlayed === 5 ) {
        winCondition(humanScore, computerScore)
        { alert ("list " + humanScore + "list " + computerScore);}
    } else if (roundsPlayed < 5 ){
        playGame();
    }

};
